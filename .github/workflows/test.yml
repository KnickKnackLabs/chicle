name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install PowerShell modules
        run: mise run setup

      - name: Lint
        run: mise run lint

  bash-test:
    name: "Bash - ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04"
            os: ubuntu-22.04
          - name: "Ubuntu 24.04"
            os: ubuntu-24.04
          - name: "macOS (ARM)"
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install interactive test dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect perl zsh

      - name: Install interactive test dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install expect

      - name: Run BATS tests
        run: mise run test:bash
        env:
          TERM: xterm

  powershell-test:
    name: "PowerShell - ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 24.04"
            os: ubuntu-24.04
          - name: "macOS (ARM)"
            os: macos-latest
          - name: "Windows"
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install PowerShell modules
        run: mise run setup

      - name: Run Pester tests
        run: mise run test:pwsh
