name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Lint chicle.sh
        run: shellcheck chicle.sh

      - name: Lint test.sh
        run: shellcheck -x test.sh

  bash-test:
    name: "Bash - ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04"
            os: ubuntu-22.04
          - name: "Ubuntu 24.04"
            os: ubuntu-24.04
          - name: "macOS (ARM)"
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install interactive test dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect perl zsh

      - name: Install interactive test dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install expect

      - name: Show versions
        run: |
          echo "bash: $(bash --version | head -1)"
          echo "bats: $(bats --version)"
          echo "zsh: $(zsh --version 2>/dev/null || echo 'not available')"

      - name: Run BATS tests
        run: bash test.sh
        env:
          TERM: xterm

  powershell-test:
    name: "PowerShell - ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 24.04"
            os: ubuntu-24.04
          - name: "macOS (ARM)"
            os: macos-latest
          - name: "Windows"
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable.PSVersion

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: pwsh test.ps1
