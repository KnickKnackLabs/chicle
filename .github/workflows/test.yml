name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect perl

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install expect

      - name: Show bash version
        run: bash --version

      - name: Run tests
        run: bash test.sh
        env:
          TERM: xterm
